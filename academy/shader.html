<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<title>WebGL Shader Demo | The Right Seed</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
  }
  .controls-overlay {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    background: rgba(30, 30, 34, 0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 16px;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  @media (max-width: 640px) {
    .controls-overlay {
      flex-wrap: wrap;
      justify-content: center;
      bottom: 16px;
      padding: 12px 16px;
      border-radius: 12px;
      width: calc(100% - 32px);
    }
  }
</style>
</head>
<body>
<div class="fixed inset-0 w-full h-full">
  <canvas id="shader-canvas-ANIMATION_2" style="display:block;width:100%;height:100%"></canvas>
</div>

<!-- Controls overlay -->
<div class="controls-overlay">
  <a href="index.html" class="flex items-center gap-2 text-primary hover:text-primary/80 transition-colors font-bold text-sm">
    <span class="material-symbols-outlined text-sm">arrow_back</span>
    Back to Home
  </a>
  <span class="text-outline hidden sm:inline">|</span>
  <span class="text-on-surface-variant text-xs">Move mouse to interact</span>
  <span class="text-outline hidden sm:inline">|</span>
  <a href="tracker.html" class="flex items-center gap-2 text-secondary hover:text-secondary/80 transition-colors font-bold text-sm">
    Open Tracker
    <span class="material-symbols-outlined text-sm">arrow_forward</span>
  </a>
</div>

<script>
(function() {
  const canvas = document.getElementById('shader-canvas-ANIMATION_2');
  function syncSize() {
    const w = canvas.clientWidth  || window.innerWidth;
    const h = canvas.clientHeight || window.innerHeight;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width  = w;
      canvas.height = h;
    }
  }
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(syncSize).observe(canvas);
  }
  syncSize();

  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;
  const vs = `attribute vec2 a_position;
varying vec2 v_texCoord;
void main() {
  v_texCoord = a_position * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;
  const fs = `precision highp float;
uniform float u_time;
uniform vec2 u_resolution;
uniform vec2 u_mouse;
varying vec2 v_texCoord;
void main() {
    vec2 uv = v_texCoord;
    vec2 center = uv - 0.5;
    center.x *= u_resolution.x / u_resolution.y;
    float wave1 = sin(uv.x * 10.0 + u_time * 0.5) * 0.1;
    float wave2 = cos(uv.y * 8.0 - u_time * 0.3) * 0.05;
    float dist = length(center + vec2(wave1, wave2));
    vec3 charcoal = vec3(0.07, 0.07, 0.08);
    vec3 emerald = vec3(0.0, 0.78, 0.32);
    vec3 iceBlue = vec3(0.0, 0.9, 1.0);
    float glow = 0.02 / (dist + 0.01);
    glow *= (0.5 + 0.5 * sin(u_time * 2.0));
    vec3 color = charcoal;
    color = mix(color, emerald, smoothstep(0.5, 0.0, dist) * 0.1);
    color = mix(color, iceBlue, glow * 0.4);
    float grid = sin(uv.x * 100.0) * sin(uv.y * 100.0);
    color += grid * 0.01;
    gl_FragColor = vec4(color, 1.0);
}`;
  function cs(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, cs(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, cs(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog);
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const pos = gl.getAttribLocation(prog, 'a_position');
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uRes = gl.getUniformLocation(prog, 'u_resolution');
  const uMouse = gl.getUniformLocation(prog, 'u_mouse');

  let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
  window.addEventListener('mousemove', (event) => {
    const rect = canvas.getBoundingClientRect();
    if (rect.width && rect.height) {
      const nx = (event.clientX - rect.left) / rect.width;
      const ny = 1.0 - (event.clientY - rect.top) / rect.height;
      mouse.x = nx * canvas.width;
      mouse.y = ny * canvas.height;
    }
  });

  function render(t) {
    if (typeof ResizeObserver === 'undefined') syncSize();
    gl.viewport(0, 0, canvas.width, canvas.height);
    if (uTime) gl.uniform1f(uTime, t * 0.001);
    if (uRes) gl.uniform2f(uRes, canvas.width, canvas.height);
    if (uMouse) gl.uniform2f(uMouse, mouse.x, mouse.y);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }
  render(0);
})();
</script>
</body>
</html>
